<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/webp" href="favicon.webp" />

  <title>Aum</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #001a7a;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
    }

    /* ===== ФОН ===== */
    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .bg {
      position: absolute;
      inset: -3%;
      background: url("images/aum.webp") center center / cover no-repeat;
      transform: translate3d(0, 0, 0) scale(1);
      transform-origin: center center;
      will-change: transform;
    }

    /* ===== ЗВЕЗДЫ ===== */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow:
        0 0 4px rgba(255,255,255,0.8),
        0 0 10px rgba(180,220,255,0.4);
      animation: twinkle linear infinite;
    }

    /* ===== ЧАСТИЦЫ ===== */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(200,230,255,0.95);
      box-shadow:
        0 0 6px rgba(200,230,255,0.9),
        0 0 14px rgba(120,180,255,0.5);
      animation: floatParticle linear infinite;
    }

    /* ===== EMAIL ===== */
    .contact-badge {
      position: fixed;
      right: 34px;
      bottom: 70px;
      z-index: 50;
      display: inline-block;
      animation: contactFadeIn 1.5s ease-out both;
      animation-delay: 0.4s;
      will-change: transform;
    }

    .contact-badge a {
      display: block;
      position: relative;
      text-decoration: none;
      overflow: visible;
    }

    .contact-main {
      display: block;
      width: min(500px, 30vw);
      height: auto;
      position: relative;
      z-index: 2;
      filter:
        drop-shadow(0 0 8px rgba(255,255,255,0.35))
        drop-shadow(0 0 16px rgba(255,255,255,0.2));
      transition: transform 0.3s ease;
    }

    .contact-badge:hover .contact-main {
      transform: scale(1.02);
    }

    .contact-reflection {
      display: block;
      position: absolute;
      left: 0;
      top: 100%;
      width: min(500px, 30vw);
      height: auto;
      transform: translateY(70%) scaleY(-1);
      transform-origin: top;
      opacity: 0.35;
      filter: blur(0.4px);
      pointer-events: none;
      z-index: 1;

      mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 85%);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 85%);
    }

    /* ===== АНИМАЦИИ ===== */
    @keyframes twinkle {
      0%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-140px) translateX(20px);
        opacity: 0;
      }
    }

    @keyframes contactFadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 780px) {
      .contact-badge {
        right: 20px;
        bottom: 20px;
      }

      .contact-main,
      .contact-reflection {
        width: min(540px, 44vw);
      }

      .bg {
        inset: -5%;
      }
    }

    @media (max-width: 520px) {
      .contact-main,
      .contact-reflection {
        width: min(260px, 70vw);
      }

      .contact-reflection {
        opacity: 0.26;
      }

      .bg {
        inset: -7%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .star,
      .particle,
      .contact-badge {
        animation: none;
      }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="bg" id="bg"></div>
  </div>

  <div class="stars" id="stars"></div>
  <div class="particles" id="particles"></div>

  <div class="contact-badge" id="contactBadge">
    <a href="mailto:sezam3@ya.ru">
      <img class="contact-main" src="images/contact.webp" alt="email">
      <img class="contact-reflection" src="images/contact.webp" alt="">
    </a>
  </div>

  <script>
    const bg = document.getElementById("bg");
    const contactBadge = document.getElementById("contactBadge");

    let mouseX = 0;
    let mouseY = 0;
    let currentX = 0;
    let currentY = 0;

    function createStars(count = 80) {
      const stars = document.getElementById("stars");

      for (let i = 0; i < count; i++) {
        const star = document.createElement("div");
        star.className = "star";

        const size = Math.random() * 2.5 + 1;
        star.style.width = size + "px";
        star.style.height = size + "px";
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.animationDuration = (2 + Math.random() * 4) + "s";
        star.style.animationDelay = Math.random() * 5 + "s";

        stars.appendChild(star);
      }
    }

    function createParticles(count = 20) {
      const particles = document.getElementById("particles");

      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "particle";

        p.style.left = (10 + Math.random() * 80) + "%";
        p.style.top = (60 + Math.random() * 30) + "%";
        p.style.animationDuration = (5 + Math.random() * 6) + "s";
        p.style.animationDelay = Math.random() * 8 + "s";

        particles.appendChild(p);
      }
    }

    document.addEventListener("mousemove", (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });

    function animateScene(time) {
      currentX += (mouseX - currentX) * 0.035;
      currentY += (mouseY - currentY) * 0.035;

      const breath = 1 + Math.sin(time * 0.00018) * 0.018;

      const bgX = currentX * 12;
      const bgY = currentY * 10;

      const contactX = currentX * 10;
      const contactY = currentY * 8;

      bg.style.transform = `translate3d(${bgX}px, ${bgY}px, 0) scale(${breath})`;
      contactBadge.style.transform = `translate3d(${contactX}px, ${contactY}px, 0)`;

      requestAnimationFrame(animateScene);
    }

    createStars();
    createParticles();
    requestAnimationFrame(animateScene);
  </script>

</body>
</html>
