<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Sezam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0fa3a3;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Фон */
    .bg {
      position: fixed;
      inset: -20px;
      background: url("images/person.webp") no-repeat center center;
      background-size: cover;
      will-change: transform;
      z-index: 0;
    }

    /* Затемнение */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.22);
      z-index: 1;
      pointer-events: none;
    }

    /* Контейнер силуэтов */
    .ghost-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    /* Общий призрачный силуэт */
    .ghost {
      position: absolute;
      width: 260px;
      height: 560px;
      opacity: 0;
      filter: blur(28px);
      mix-blend-mode: multiply;
      will-change: transform, opacity;
    }

    /* Составные части силуэта */
    .ghost::before,
    .ghost::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 18, 22, 0.75);
      border-radius: 50%;
    }

    /* Голова */
    .ghost::before {
      top: 48px;
      width: 100px;
      height: 110px;
      filter: blur(10px);
    }

    /* Тело */
    .ghost::after {
      top: 125px;
      width: 180px;
      height: 355px;
      border-radius: 45% 45% 40% 40% / 28% 28% 55% 55%;
      filter: blur(18px);
    }

    /* Доп. внутреннее облако для силуэта */
    .ghost .core {
      position: absolute;
      left: 50%;
      top: 155px;
      transform: translateX(-50%);
      width: 115px;
      height: 260px;
      background: rgba(5, 8, 12, 0.6);
      border-radius: 50%;
      filter: blur(24px);
    }

    /* Левый силуэт */
    .ghost-left {
      left: 31%;
      top: 16%;
      animation: ghostLeftCycle 15s ease-in-out infinite;
    }

    /* Правый силуэт */
    .ghost-right {
      left: 58%;
      top: 15%;
      animation: ghostRightCycle 15s ease-in-out infinite;
    }

    @keyframes ghostLeftCycle {
      0% {
        opacity: 0;
        transform: translateX(-18px) scale(0.94);
      }
      10% {
        opacity: 0;
      }
      22% {
        opacity: 0.22;
        transform: translateX(-8px) scale(0.98);
      }
      34% {
        opacity: 0.30;
        transform: translateX(0px) scale(1);
      }
      46% {
        opacity: 0.12;
        transform: translateX(8px) scale(1.03);
      }
      56% {
        opacity: 0;
        transform: translateX(12px) scale(1.05);
      }
      100% {
        opacity: 0;
        transform: translateX(12px) scale(1.05);
      }
    }

    @keyframes ghostRightCycle {
      0% {
        opacity: 0;
        transform: translateX(14px) scale(0.95);
      }
      50% {
        opacity: 0;
        transform: translateX(14px) scale(0.95);
      }
      62% {
        opacity: 0.16;
        transform: translateX(8px) scale(0.98);
      }
      74% {
        opacity: 0.28;
        transform: translateX(0px) scale(1);
      }
      86% {
        opacity: 0.11;
        transform: translateX(-8px) scale(1.03);
      }
      100% {
        opacity: 0;
        transform: translateX(-12px) scale(1.05);
      }
    }

    /* email */
    .email {
      position: fixed;
      right: 60px;
      bottom: 60px;
      z-index: 4;
      will-change: transform;
      animation: floatSmooth 8s ease-in-out infinite;
    }

    .email img {
      width: 420px;
      display: block;
      height: auto;
      transition: transform 0.4s ease;
    }

    .email a {
      display: block;
      text-decoration: none;
    }

    .email:hover img {
      transform: scale(1.03);
    }

    @keyframes floatSmooth {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    /* Планшеты */
    @media (max-width: 1024px) {
      .ghost {
        width: 200px;
        height: 430px;
        filter: blur(24px);
      }

      .ghost::before {
        width: 78px;
        height: 88px;
      }

      .ghost::after {
        top: 105px;
        width: 145px;
        height: 275px;
      }

      .ghost .core {
        top: 132px;
        width: 92px;
        height: 205px;
      }

      .ghost-left {
        left: 28%;
        top: 18%;
      }

      .ghost-right {
        left: 60%;
        top: 17%;
      }

      .email {
        right: 40px;
        bottom: 40px;
      }

      .email img {
        width: 300px;
      }
    }

    /* Телефоны */
    @media (max-width: 768px) {
      .ghost {
        width: 140px;
        height: 300px;
        filter: blur(20px);
      }

      .ghost::before {
        top: 28px;
        width: 52px;
        height: 58px;
      }

      .ghost::after {
        top: 72px;
        width: 95px;
        height: 190px;
      }

      .ghost .core {
        top: 92px;
        width: 62px;
        height: 135px;
      }

      .ghost-left {
        left: 18%;
        top: 22%;
      }

      .ghost-right {
        left: 64%;
        top: 21%;
      }

      .email {
        right: 20px;
        bottom: 20px;
      }

      .email img {
        width: 180px;
      }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="bg" id="bg"></div>
    <div class="overlay"></div>

    <div class="ghost-layer" id="ghostLayer">
      <div class="ghost ghost-left" id="ghostLeft">
        <div class="core"></div>
      </div>
      <div class="ghost ghost-right" id="ghostRight">
        <div class="core"></div>
      </div>
    </div>

    <div class="email" id="email">
      <a href="mailto:sezam3@ya.ru">
        <img src="images/contact.webp" alt="sezam3@ya.ru">
      </a>
    </div>
  </div>

  <script>
    const bg = document.getElementById("bg");
    const email = document.getElementById("email");
    const ghostLeft = document.getElementById("ghostLeft");
    const ghostRight = document.getElementById("ghostRight");

    let mouseX = 0;
    let mouseY = 0;
    let currentX = 0;
    let currentY = 0;

    document.addEventListener("mousemove", (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });

    function animateParallax() {
      currentX += (mouseX - currentX) * 0.05;
      currentY += (mouseY - currentY) * 0.05;

      bg.style.transform = `translate(${currentX * 8}px, ${currentY * 8}px) scale(1.02)`;
      email.style.transform = `translate(${currentX * 14}px, ${currentY * 14}px)`;

      ghostLeft.style.marginLeft = `${currentX * 10}px`;
      ghostLeft.style.marginTop = `${currentY * 6}px`;

      ghostRight.style.marginLeft = `${currentX * 12}px`;
      ghostRight.style.marginTop = `${currentY * 7}px`;

      requestAnimationFrame(animateParallax);
    }

    animateParallax();
  </script>

</body>
</html>
