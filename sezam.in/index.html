<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/webp" href="favicon.webp">

  <title>Fog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0fa3a3;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: -20px;
      background: url("images/person.webp") no-repeat center center;
      background-size: cover;
      will-change: transform;
      z-index: 0;
    }

    .ghost-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .ghost {
      position: absolute;
      left: 0;
      top: 0;
      width: 440px;
      height: 860px;
      opacity: 0;
      will-change: transform, opacity, filter;
      filter: blur(42px);
      mix-blend-mode: multiply;
    }

    .ghost-inner {
      position: absolute;
      inset: 0;
      will-change: transform;
    }

    .ghost-shape {
      position: absolute;
      inset: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      background: rgba(7, 10, 14, 0.78);
      filter: blur(48px);
      transform: translateZ(0);
    }

    .blob-1 {
      left: 146px;
      top: 44px;
      width: 118px;
      height: 138px;
      background: rgba(7, 10, 14, 0.68);
      filter: blur(34px);
    }

    .blob-2 {
      left: 104px;
      top: 16px;
      width: 196px;
      height: 222px;
      background: rgba(4, 7, 11, 0.48);
      filter: blur(60px);
    }

    .blob-3 {
      left: 50px;
      top: 154px;
      width: 320px;
      height: 154px;
      background: rgba(7, 10, 14, 0.62);
      filter: blur(50px);
    }

    .blob-4 {
      left: 100px;
      top: 232px;
      width: 232px;
      height: 310px;
      background: rgba(6, 9, 13, 0.72);
      filter: blur(46px);
    }

    .blob-5 {
      left: 74px;
      top: 430px;
      width: 286px;
      height: 306px;
      background: rgba(5, 8, 12, 0.62);
      filter: blur(62px);
    }

    .blob-6 {
      left: 10px;
      top: 230px;
      width: 154px;
      height: 320px;
      background: rgba(5, 8, 12, 0.40);
      filter: blur(68px);
    }

    .blob-7 {
      right: 10px;
      top: 240px;
      width: 154px;
      height: 306px;
      background: rgba(5, 8, 12, 0.40);
      filter: blur(68px);
    }

    .blob-8 {
      left: 154px;
      top: 226px;
      width: 110px;
      height: 314px;
      background: rgba(0, 0, 0, 0.30);
      filter: blur(46px);
    }

    .blob-9 {
      left: 130px;
      top: 600px;
      width: 176px;
      height: 136px;
      background: rgba(4, 6, 10, 0.24);
      filter: blur(62px);
    }

    .hand-slam {
      position: absolute;
      left: 0;
      top: 0;
      width: 360px;
      height: 470px;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      will-change: transform, opacity, filter;
      filter: blur(9px);
    }

    .hand-inner {
      position: absolute;
      inset: 0;
      will-change: transform;
    }

    .hand-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      opacity: 0.9;
      filter:
        drop-shadow(0 0 8px rgba(0, 255, 255, 0.10))
        drop-shadow(0 0 18px rgba(0, 255, 255, 0.08));
      transform-origin: center center;
    }

    .hand-aura-1,
    .hand-aura-2 {
      position: absolute;
      border-radius: 50%;
      background: rgba(10, 255, 255, 0.08);
      filter: blur(38px);
      pointer-events: none;
    }

    .hand-aura-1 {
      left: 70px;
      top: 70px;
      width: 210px;
      height: 250px;
    }

    .hand-aura-2 {
      left: 40px;
      top: 170px;
      width: 240px;
      height: 210px;
    }

    .dragon-face {
      position: fixed;
      top: 46%;
      width: auto;
      height: 132vh;
      max-height: none;
      opacity: 0;
      pointer-events: none;
      z-index: 1.7;
      will-change: transform, opacity, filter;
      filter: blur(12px);
      transform-origin: center center;
    }

    .dragon-face img {
      display: block;
      width: auto;
      height: 100%;
      user-select: none;
      -webkit-user-drag: none;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    .woman-layer {
      position: fixed;
      inset: -20px;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      background: url("images/woman-cutout.webp") no-repeat center center;
      background-size: cover;
      will-change: transform;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.10);
      z-index: 3;
      pointer-events: none;
    }

    .email {
      position: fixed;
      right: 60px;
      bottom: 60px;
      z-index: 4;
      will-change: transform;
      animation: floatSmooth 8s ease-in-out infinite;
    }

    .email img {
      width: 420px;
      display: block;
      height: auto;
      transition: transform 0.4s ease;
    }

    .email a {
      display: block;
      text-decoration: none;
    }

    .email:hover img {
      transform: scale(1.03);
    }

    @keyframes floatSmooth {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 1024px) {
      .ghost {
        width: 320px;
        height: 620px;
        filter: blur(34px);
      }

      .blob-1 { left: 106px; top: 30px; width: 84px; height: 98px; }
      .blob-2 { left: 76px; top: 10px; width: 140px; height: 156px; }
      .blob-3 { left: 34px; top: 110px; width: 226px; height: 108px; }
      .blob-4 { left: 72px; top: 166px; width: 164px; height: 214px; }
      .blob-5 { left: 50px; top: 314px; width: 210px; height: 224px; }
      .blob-6 { left: 4px; top: 166px; width: 110px; height: 218px; }
      .blob-7 { right: 4px; top: 170px; width: 110px; height: 214px; }
      .blob-8 { left: 110px; top: 164px; width: 78px; height: 218px; }
      .blob-9 { left: 92px; top: 440px; width: 120px; height: 90px; }

      .hand-slam {
        width: 280px;
        height: 370px;
      }

      .hand-aura-1 {
        left: 56px;
        top: 54px;
        width: 162px;
        height: 194px;
      }

      .hand-aura-2 {
        left: 30px;
        top: 138px;
        width: 190px;
        height: 170px;
      }

      .dragon-face {
        top: 45%;
        height: 128vh;
      }

      .email {
        right: 40px;
        bottom: 40px;
      }

      .email img {
        width: 340px;
      }
    }

    @media (max-width: 768px) {
      .ghost {
        width: 200px;
        height: 390px;
        filter: blur(24px);
      }

      .blob-1 { left: 66px; top: 18px; width: 54px; height: 62px; }
      .blob-2 { left: 48px; top: 6px; width: 86px; height: 96px; }
      .blob-3 { left: 18px; top: 68px; width: 140px; height: 66px; }
      .blob-4 { left: 42px; top: 102px; width: 104px; height: 138px; }
      .blob-5 { left: 28px; top: 188px; width: 134px; height: 142px; }
      .blob-6 { left: 0px; top: 100px; width: 68px; height: 142px; }
      .blob-7 { right: 0px; top: 104px; width: 68px; height: 138px; }
      .blob-8 { left: 68px; top: 100px; width: 50px; height: 140px; }
      .blob-9 { left: 58px; top: 274px; width: 82px; height: 58px; }

      .hand-slam {
        width: 190px;
        height: 250px;
      }

      .hand-aura-1 {
        left: 38px;
        top: 36px;
        width: 112px;
        height: 132px;
      }

      .hand-aura-2 {
        left: 20px;
        top: 92px;
        width: 126px;
        height: 114px;
      }

      .dragon-face {
        top: 44%;
        height: 118vh;
      }

      .email {
        right: 20px;
        bottom: 20px;
      }

      .email img {
        width: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bg" id="bg"></div>

    <div class="ghost-layer">
      <div class="ghost" id="ghost">
        <div class="ghost-inner" id="ghostInner">
          <div class="ghost-shape">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
            <div class="blob blob-5"></div>
            <div class="blob blob-6"></div>
            <div class="blob blob-7"></div>
            <div class="blob blob-8"></div>
            <div class="blob blob-9"></div>
          </div>
        </div>
      </div>

      <div class="hand-slam" id="handSlam">
        <div class="hand-inner" id="handInner">
          <div class="hand-aura-1"></div>
          <div class="hand-aura-2"></div>
          <img class="hand-img" src="images/palm.webp" alt="">
        </div>
      </div>
    </div>

    <div class="dragon-face" id="dragonFace">
      <img src="images/dragon.webp" alt="">
    </div>

    <div class="woman-layer" id="womanCutout"></div>

    <div class="overlay"></div>

    <div class="email" id="email">
      <a href="mailto:sezam3@ya.ru">
        <img src="images/contact.webp" alt="sezam3@ya.ru">
      </a>
    </div>
  </div>

  <script>
    const bg = document.getElementById("bg");
    const email = document.getElementById("email");
    const ghost = document.getElementById("ghost");
    const ghostInner = document.getElementById("ghostInner");
    const womanCutout = document.getElementById("womanCutout");
    const handSlam = document.getElementById("handSlam");
    const handInner = document.getElementById("handInner");
    const dragonFace = document.getElementById("dragonFace");

    let mouseX = 0;
    let mouseY = 0;
    let currentX = 0;
    let currentY = 0;

    document.addEventListener("mousemove", (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });

    function animateParallax() {
      currentX += (mouseX - currentX) * 0.05;
      currentY += (mouseY - currentY) * 0.05;

      bg.style.transform = `translate(${currentX * 8}px, ${currentY * 8}px) scale(1.02)`;
      womanCutout.style.transform = `translate(${currentX * 4}px, ${currentY * 4}px) scale(1.02)`;
      email.style.transform = `translate(${currentX * 14}px, ${currentY * 14}px)`;

      requestAnimationFrame(animateParallax);
    }

    animateParallax();

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOutQuad(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function getGhostSize() {
      if (window.innerWidth <= 768) return { w: 200, h: 390 };
      if (window.innerWidth <= 1024) return { w: 320, h: 620 };
      return { w: 440, h: 860 };
    }

    function getPlacement() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const size = getGhostSize();
      const isLeft = Math.random() < 0.5;
      let xPercent;
      let yPercent;

      if (window.innerWidth <= 768) {
        xPercent = isLeft ? rand(18, 30) : rand(70, 82);
        yPercent = rand(30, 72);
      } else if (window.innerWidth <= 1024) {
        xPercent = isLeft ? rand(18, 32) : rand(68, 82);
        yPercent = rand(26, 74);
      } else {
        xPercent = isLeft ? rand(18, 34) : rand(66, 82);
        yPercent = rand(24, 76);
      }

      return {
        x: (vw * xPercent / 100) - size.w / 2,
        y: (vh * yPercent / 100) - size.h / 2,
        side: isLeft ? "left" : "right"
      };
    }

    function setGhostMood() {
      const blur = rand(34, 48);
      const peak = rand(0.30, 0.52);
      const scale = rand(1.08, 1.24);

      ghost.style.filter = `blur(${blur.toFixed(1)}px)`;
      ghost.dataset.peak = peak.toFixed(3);
      ghost.dataset.scale = scale.toFixed(3);
    }

    function animateGhostSlow() {
      return new Promise(resolve => {
        const pos = getPlacement();

        setGhostMood();

        ghost.style.left = `${pos.x}px`;
        ghost.style.top = `${pos.y}px`;

        const peakOpacity = parseFloat(ghost.dataset.peak);
        const baseScale = parseFloat(ghost.dataset.scale);

        const fadeIn = rand(1800, 3000);
        const stay = rand(2600, 5200);
        const fadeOut = rand(1800, 3200);
        const total = fadeIn + stay + fadeOut;

        const driftMainX = pos.side === "left" ? rand(24, 80) : rand(-80, -24);
        const driftMainY = rand(-24, 26);

        const sideSwayA = rand(12, 26);
        const sideSwayB = rand(8, 18);
        const verticalBreath = rand(5, 14);

        const startTime = performance.now();

        function frame(now) {
          const elapsed = now - startTime;
          const life = elapsed / 1000;

          let opacity;
          let progress;

          if (elapsed <= fadeIn) {
            const p = elapsed / fadeIn;
            opacity = peakOpacity * easeInOutQuad(p);
            progress = p * 0.35;
          } else if (elapsed <= fadeIn + stay) {
            const p = (elapsed - fadeIn) / stay;
            opacity = peakOpacity;
            progress = 0.35 + p * 0.35;
          } else {
            const p = (elapsed - fadeIn - stay) / fadeOut;
            opacity = peakOpacity * (1 - easeInOutQuad(p));
            progress = 0.70 + p * 0.30;
          }

          const moveX =
            driftMainX * progress +
            Math.sin(life * 0.8) * sideSwayA +
            Math.sin(life * 1.7) * sideSwayB * 0.45;

          const moveY =
            driftMainY * progress +
            Math.sin(life * 1.2) * verticalBreath;

          const scale = baseScale + Math.sin(life * 0.7) * 0.014;

          ghost.style.opacity = opacity.toFixed(3);
          ghostInner.style.transform =
            `translate(${moveX.toFixed(2)}px, ${moveY.toFixed(2)}px) scale(${scale.toFixed(3)})`;

          if (elapsed < total) {
            requestAnimationFrame(frame);
          } else {
            ghost.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function animateGhostDash() {
      return new Promise(resolve => {
        const size = getGhostSize();
        setGhostMood();

        const fromLeft = Math.random() < 0.5;
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        let startX, endX, baseY;

        if (fromLeft) {
          startX = -size.w * 0.9;
          endX = vw + size.w * 0.2;
        } else {
          startX = vw + size.w * 0.2;
          endX = -size.w * 0.9;
        }

        if (window.innerWidth <= 768) {
          baseY = vh * rand(0.56, 0.78);
        } else if (window.innerWidth <= 1024) {
          baseY = vh * rand(0.54, 0.78);
        } else {
          baseY = vh * rand(0.52, 0.76);
        }

        const diag = rand(-36, 36);
        const duration = rand(700, 1200);
        const peakOpacity = rand(0.20, 0.34);
        const baseScale = rand(1.02, 1.20);

        ghost.style.left = `${startX}px`;
        ghost.style.top = `${baseY - size.h / 2}px`;

        const startTime = performance.now();

        function frame(now) {
          const elapsed = now - startTime;
          const p = Math.min(elapsed / duration, 1);

          const x = startX + (endX - startX) * easeInOutQuad(p);
          const y = (baseY - size.h / 2) + diag * p;
          const opacity = Math.sin(p * Math.PI) * peakOpacity;
          const wobbleX = Math.sin(p * Math.PI * 4) * 8;
          const wobbleY = Math.sin(p * Math.PI * 3) * 5;

          ghost.style.left = `${x}px`;
          ghost.style.top = `${y}px`;
          ghost.style.opacity = opacity.toFixed(3);
          ghostInner.style.transform =
            `translate(${wobbleX.toFixed(2)}px, ${wobbleY.toFixed(2)}px) scale(${(baseScale + Math.sin(p * Math.PI) * 0.03).toFixed(3)})`;

          if (elapsed < duration) {
            requestAnimationFrame(frame);
          } else {
            ghost.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function animateHandSlam() {
      return new Promise(resolve => {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const fromLeft = Math.random() < 0.5;

        let handW, handH;
        if (window.innerWidth <= 768) {
          handW = 190;
          handH = 250;
        } else if (window.innerWidth <= 1024) {
          handW = 280;
          handH = 370;
        } else {
          handW = 360;
          handH = 470;
        }

        const baseX = fromLeft ? vw * rand(0.08, 0.20) : vw * rand(0.72, 0.86);
        const baseY = vh * rand(0.58, 0.80);

        const slamInX = fromLeft ? -rand(130, 190) : rand(130, 190);
        const settleDriftY = rand(22, 48);
        const settleDriftX = fromLeft ? rand(8, 20) : rand(-20, -8);

        handSlam.style.left = `${baseX - handW / 2}px`;
        handSlam.style.top = `${baseY - handH / 2}px`;
        handSlam.style.width = `${handW}px`;
        handSlam.style.height = `${handH}px`;
        handSlam.style.filter = `blur(${rand(8, 11).toFixed(1)}px) brightness(0.92) contrast(1.02)`;

        handInner.style.transform = fromLeft
          ? `translate(${slamInX}px, 26px) scale(0.70)`
          : `translate(${slamInX}px, 26px) scale(0.70) rotateY(180deg)`;

        const hitDuration = rand(180, 260);
        const holdDuration = rand(260, 520);
        const fadeDuration = rand(1200, 1800);
        const peakOpacity = rand(0.34, 0.46);

        const startTime = performance.now();
        const total = hitDuration + holdDuration + fadeDuration;

        function frame(now) {
          const elapsed = now - startTime;

          let opacity = 0;
          let tx = 0;
          let ty = 0;
          let sc = 1;

          if (elapsed <= hitDuration) {
            const p = elapsed / hitDuration;
            const e = easeOutCubic(p);

            opacity = peakOpacity * e;
            tx = slamInX * (1 - e);
            ty = 26 * (1 - e);
            sc = 0.70 + e * 0.36;
          } else if (elapsed <= hitDuration + holdDuration) {
            const p = (elapsed - hitDuration) / holdDuration;

            opacity = peakOpacity * (0.99 + Math.sin(p * Math.PI) * 0.01);
            tx = Math.sin(p * Math.PI * 2.1) * 1.1;
            ty = Math.sin(p * Math.PI * 1.7) * 1.1;
            sc = 1.06 - Math.sin(p * Math.PI) * 0.008;
          } else {
            const p = (elapsed - hitDuration - holdDuration) / fadeDuration;
            const e = easeInOutQuad(p);

            opacity = peakOpacity * (1 - e);
            tx = settleDriftX * e;
            ty = settleDriftY * e;
            sc = 1.05 - e * 0.12;
          }

          handSlam.style.opacity = opacity.toFixed(3);

          const transformCore = fromLeft
            ? `translate(${tx.toFixed(2)}px, ${ty.toFixed(2)}px) scale(${sc.toFixed(3)})`
            : `translate(${tx.toFixed(2)}px, ${ty.toFixed(2)}px) scale(${sc.toFixed(3)}) rotateY(180deg)`;

          handInner.style.transform = transformCore;

          if (elapsed < total) {
            requestAnimationFrame(frame);
          } else {
            handSlam.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function animateDragonFace() {
      return new Promise(resolve => {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const side = Math.random() < 0.5 ? "left" : "right";

        const appearDuration = 4800;
        const holdDuration = 7000;
        const fadeDuration = 4200;
        const total = appearDuration + holdDuration + fadeDuration;

        const centerY = vh * 0.44;

        let anchorX;
        let sideDriftX;

        if (side === "left") {
          anchorX = vw * 0.19;
          sideDriftX = rand(42, 78);
        } else {
          anchorX = vw * 0.81;
          sideDriftX = rand(-78, -42);
        }

        const sideDriftY = rand(-10, 10);

        const startScale = rand(0.72, 0.78);
        const finalScale = rand(1.06, 1.11);
        const endScale = rand(0.86, 0.92);

        const startBlur = rand(14, 18);
        const finalBlur = 0;
        const endBlur = rand(8, 12);

        const peakOpacity = rand(0.84, 0.94);
        const rotate = rand(-1.2, 1.2);

        dragonFace.style.left = `${anchorX}px`;
        dragonFace.style.top = `${centerY}px`;

        const startTime = performance.now();

        function setDragonTransform(scale, tx, ty) {
          const flip = side === "right" ? " scaleX(-1)" : "";
          dragonFace.style.transform =
            `translate(-50%, -50%) translate(${tx.toFixed(2)}px, ${ty.toFixed(2)}px) rotate(${rotate.toFixed(2)}deg) scale(${scale.toFixed(3)})${flip}`;
        }

        function frame(now) {
          const elapsed = now - startTime;

          let opacity = 0;
          let blur = startBlur;
          let scale = startScale;
          let tx = 0;
          let ty = 0;
          let filterValue = `blur(${startBlur.toFixed(2)}px)`;

          if (elapsed <= appearDuration) {
            const p = elapsed / appearDuration;
            const e = easeInOutQuad(p);

            opacity = peakOpacity * e;
            blur = startBlur + (finalBlur - startBlur) * e;
            scale = startScale + (finalScale - startScale) * e;
            tx = sideDriftX * 0.28 * e;
            ty = sideDriftY * 0.28 * e;

            filterValue = `blur(${blur.toFixed(2)}px)`;
          } else if (elapsed <= appearDuration + holdDuration) {
            const p = (elapsed - appearDuration) / holdDuration;

            opacity = peakOpacity;
            blur = finalBlur;
            scale = finalScale + Math.sin(p * Math.PI * 1.2) * 0.002;
            tx = sideDriftX * (0.28 + p * 0.04);
            ty = sideDriftY * (0.28 + p * 0.04);

            filterValue = "none";
          } else {
            const p = (elapsed - appearDuration - holdDuration) / fadeDuration;
            const e = easeInOutQuad(p);

            opacity = peakOpacity * (1 - e);
            blur = finalBlur + (endBlur - finalBlur) * e;
            scale = finalScale + (endScale - finalScale) * e;
            tx = sideDriftX * (0.32 + e * 0.50);
            ty = sideDriftY * (0.32 + e * 0.50);

            filterValue = `blur(${blur.toFixed(2)}px)`;
          }

          dragonFace.style.opacity = opacity.toFixed(3);
          dragonFace.style.filter = filterValue;
          setDragonTransform(scale, tx, ty);

          if (elapsed < total) {
            requestAnimationFrame(frame);
          } else {
            dragonFace.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    async function ghostLoop() {
      while (true) {
        await sleep(randInt(1000, 4200));

        const r = Math.random();

        if (r < 0.12) {
          await animateDragonFace();
        } else if (r < 0.28) {
          await animateHandSlam();
        } else if (r < 0.50) {
          await animateGhostDash();
        } else {
          await animateGhostSlow();
        }

        await sleep(randInt(400, 1800));
      }
    }

    ghostLoop();
  </script>
</body>
