<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Fog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0fa3a3;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: -20px;
      background: url("images/person.webp") no-repeat center center;
      background-size: cover;
      will-change: transform;
      z-index: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.16);
      z-index: 1;
      pointer-events: none;
    }

    .ghost-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    /* Общий контейнер тени */
    .ghost {
      position: absolute;
      left: 0;
      top: 0;
      width: 320px;
      height: 640px;
      opacity: 0;
      filter: blur(26px);
      will-change: transform, opacity, filter;
      mix-blend-mode: multiply;
    }

    .ghost-inner {
      position: absolute;
      inset: 0;
      will-change: transform, opacity;
    }

    /* Силуэт не "человек из деталей", а облачная фигура */
    .ghost-shape {
      position: absolute;
      inset: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      background: rgba(7, 10, 14, 0.78);
      filter: blur(30px);
      transform: translateZ(0);
    }

    /* Верх */
    .blob-1 {
      left: 104px;
      top: 34px;
      width: 96px;
      height: 118px;
      background: rgba(6, 9, 13, 0.72);
      filter: blur(24px);
    }

    /* Волосы/аура сверху */
    .blob-2 {
      left: 82px;
      top: 18px;
      width: 144px;
      height: 170px;
      background: rgba(4, 7, 11, 0.52);
      filter: blur(38px);
    }

    /* Плечи */
    .blob-3 {
      left: 46px;
      top: 126px;
      width: 224px;
      height: 124px;
      background: rgba(7, 10, 14, 0.64);
      filter: blur(34px);
    }

    /* Торс */
    .blob-4 {
      left: 72px;
      top: 182px;
      width: 176px;
      height: 230px;
      background: rgba(6, 9, 13, 0.72);
      filter: blur(32px);
    }

    /* Нижняя масса */
    .blob-5 {
      left: 50px;
      top: 322px;
      width: 220px;
      height: 236px;
      background: rgba(5, 8, 12, 0.62);
      filter: blur(40px);
    }

    /* Левый дым */
    .blob-6 {
      left: 18px;
      top: 168px;
      width: 108px;
      height: 250px;
      background: rgba(5, 8, 12, 0.44);
      filter: blur(42px);
    }

    /* Правый дым */
    .blob-7 {
      right: 18px;
      top: 176px;
      width: 108px;
      height: 238px;
      background: rgba(5, 8, 12, 0.42);
      filter: blur(42px);
    }

    /* Внутреннее затемнение */
    .blob-8 {
      left: 112px;
      top: 170px;
      width: 92px;
      height: 250px;
      background: rgba(0, 0, 0, 0.34);
      filter: blur(32px);
    }

    /* Нижний хвост/растворение */
    .blob-9 {
      left: 88px;
      top: 438px;
      width: 150px;
      height: 142px;
      background: rgba(4, 6, 10, 0.34);
      filter: blur(44px);
    }

    .email {
      position: fixed;
      right: 60px;
      bottom: 60px;
      z-index: 4;
      will-change: transform;
      animation: floatSmooth 8s ease-in-out infinite;
    }

    .email img {
      width: 420px;
      display: block;
      height: auto;
      transition: transform 0.4s ease;
    }

    .email a {
      display: block;
      text-decoration: none;
    }

    .email:hover img {
      transform: scale(1.03);
    }

    @keyframes floatSmooth {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 1024px) {
      .ghost {
        width: 240px;
        height: 480px;
        filter: blur(22px);
      }

      .blob-1 { left: 78px; top: 26px; width: 70px; height: 86px; }
      .blob-2 { left: 58px; top: 12px; width: 106px; height: 126px; }
      .blob-3 { left: 34px; top: 94px; width: 170px; height: 92px; }
      .blob-4 { left: 54px; top: 138px; width: 130px; height: 174px; }
      .blob-5 { left: 34px; top: 246px; width: 172px; height: 176px; }
      .blob-6 { left: 8px; top: 126px; width: 78px; height: 182px; }
      .blob-7 { right: 8px; top: 130px; width: 78px; height: 176px; }
      .blob-8 { left: 84px; top: 128px; width: 66px; height: 190px; }
      .blob-9 { left: 66px; top: 324px; width: 108px; height: 106px; }

      .email {
        right: 40px;
        bottom: 40px;
      }

      .email img {
        width: 300px;
      }
    }

    @media (max-width: 768px) {
      .ghost {
        width: 160px;
        height: 320px;
        filter: blur(18px);
      }

      .blob-1 { left: 52px; top: 18px; width: 46px; height: 58px; }
      .blob-2 { left: 38px; top: 8px; width: 72px; height: 84px; }
      .blob-3 { left: 22px; top: 62px; width: 114px; height: 60px; }
      .blob-4 { left: 36px; top: 92px; width: 88px; height: 114px; }
      .blob-5 { left: 22px; top: 164px; width: 116px; height: 120px; }
      .blob-6 { left: 6px; top: 84px; width: 50px; height: 120px; }
      .blob-7 { right: 6px; top: 86px; width: 50px; height: 120px; }
      .blob-8 { left: 56px; top: 84px; width: 44px; height: 124px; }
      .blob-9 { left: 48px; top: 218px; width: 70px; height: 64px; }

      .email {
        right: 20px;
        bottom: 20px;
      }

      .email img {
        width: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bg" id="bg"></div>
    <div class="overlay"></div>

    <div class="ghost-layer">
      <div class="ghost" id="ghost">
        <div class="ghost-inner" id="ghostInner">
          <div class="ghost-shape">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
            <div class="blob blob-5"></div>
            <div class="blob blob-6"></div>
            <div class="blob blob-7"></div>
            <div class="blob blob-8"></div>
            <div class="blob blob-9"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="email" id="email">
      <a href="mailto:sezam3@ya.ru">
        <img src="images/contact.webp" alt="sezam3@ya.ru">
      </a>
    </div>
  </div>

  <script>
    const bg = document.getElementById("bg");
    const email = document.getElementById("email");
    const ghost = document.getElementById("ghost");
    const ghostInner = document.getElementById("ghostInner");

    let mouseX = 0;
    let mouseY = 0;
    let currentX = 0;
    let currentY = 0;

    document.addEventListener("mousemove", (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });

    function animateParallax() {
      currentX += (mouseX - currentX) * 0.05;
      currentY += (mouseY - currentY) * 0.05;

      bg.style.transform = `translate(${currentX * 8}px, ${currentY * 8}px) scale(1.02)`;
      email.style.transform = `translate(${currentX * 14}px, ${currentY * 14}px)`;

      requestAnimationFrame(animateParallax);
    }

    animateParallax();

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getGhostSize() {
      if (window.innerWidth <= 768) return { w: 160, h: 320 };
      if (window.innerWidth <= 1024) return { w: 240, h: 480 };
      return { w: 320, h: 640 };
    }

    function getSafeZones() {
      if (window.innerWidth <= 768) {
        return {
          leftZone: { x1: 6, x2: 20 },
          rightZone: { x1: 78, x2: 92 },
          y1: 18,
          y2: 62
        };
      }

      if (window.innerWidth <= 1024) {
        return {
          leftZone: { x1: 8, x2: 25 },
          rightZone: { x1: 74, x2: 90 },
          y1: 14,
          y2: 64
        };
      }

      return {
        leftZone: { x1: 10, x2: 27 },
        rightZone: { x1: 73, x2: 89 },
        y1: 12,
        y2: 66
      };
    }

    function pickGhostPlacement() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const size = getGhostSize();
      const zones = getSafeZones();

      const useLeft = Math.random() < 0.5;
      const zone = useLeft ? zones.leftZone : zones.rightZone;

      const xPercent = rand(zone.x1, zone.x2);
      const yPercent = rand(zones.y1, zones.y2);

      return {
        x: (vw * xPercent / 100) - size.w / 2,
        y: (vh * yPercent / 100) - size.h / 2,
        side: useLeft ? "left" : "right"
      };
    }

    function setGhostMood() {
      const blur = rand(24, 34);
      const peak = rand(0.20, 0.38);
      const scale = rand(0.94, 1.05);

      ghost.dataset.peak = peak.toFixed(3);
      ghost.dataset.scale = scale.toFixed(3);
      ghost.style.filter = `blur(${blur.toFixed(1)}px)`;

      const blobs = ghost.querySelectorAll(".blob");
      blobs.forEach((blob, i) => {
        const extra = 0.82 + Math.random() * 0.28;
        blob.style.opacity = extra.toFixed(2);

        const shiftX = rand(-10, 10);
        const shiftY = rand(-8, 8);
        blob.style.transform = `translate(${shiftX.toFixed(1)}px, ${shiftY.toFixed(1)}px)`;
      });
    }

    function animateGhostInstance() {
      return new Promise(resolve => {
        const { x, y, side } = pickGhostPlacement();
        setGhostMood();

        ghost.style.left = `${x}px`;
        ghost.style.top = `${y}px`;

        const appearsFast = Math.random() < 0.30;
        const appearDuration = appearsFast ? rand(250, 500) : rand(1800, 3400);
        const holdDuration = rand(700, 1800);
        const fadeDuration = rand(2200, 4200);

        const driftMainX = side === "left" ? rand(20, 70) : rand(-70, -20);
        const driftMainY = rand(-12, 14);

        const sideSwayA = rand(6, 16);
        const sideSwayB = rand(4, 14);
        const verticalBreath = rand(3, 9);

        const peakOpacity = parseFloat(ghost.dataset.peak || "0.3");
        const baseScale = parseFloat(ghost.dataset.scale || "1");

        const startTime = performance.now();
        const total = appearDuration + holdDuration + fadeDuration;

        function frame(now) {
          const elapsed = now - startTime;
          const t = Math.min(elapsed / total, 1);

          let opacity = 0;
          let progress = 0;

          if (elapsed <= appearDuration) {
            const p = elapsed / appearDuration;
            opacity = peakOpacity * easeOutCubic(p);
            progress = 0.25 * p;
          } else if (elapsed <= appearDuration + holdDuration) {
            const p = (elapsed - appearDuration) / holdDuration;
            opacity = peakOpacity * (0.96 + Math.sin(p * Math.PI * 2) * 0.04);
            progress = 0.25 + 0.15 * p;
          } else {
            const p = (elapsed - appearDuration - holdDuration) / fadeDuration;
            opacity = peakOpacity * (1 - easeInOutQuad(p));
            progress = 0.40 + 0.60 * p;
          }

          const life = t * Math.PI * 2.2;
          const moveX =
            driftMainX * progress +
            Math.sin(life * 0.8) * sideSwayA +
            Math.sin(life * 1.7) * sideSwayB * 0.45;

          const moveY =
            driftMainY * progress +
            Math.sin(life * 1.2) * verticalBreath;

          const scale =
            baseScale +
            Math.sin(life * 0.7) * 0.012;

          ghost.style.opacity = opacity.toFixed(3);
          ghostInner.style.transform =
            `translate(${moveX.toFixed(2)}px, ${moveY.toFixed(2)}px) scale(${scale.toFixed(3)})`;

          if (elapsed < total) {
            requestAnimationFrame(frame);
          } else {
            ghost.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOutQuad(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    async function ghostLoop() {
      while (true) {
        await sleep(randInt(1200, 5200));
        await animateGhostInstance();
        await sleep(randInt(500, 2200));
      }
    }

    ghostLoop();
  </script>
</body>
</html>
