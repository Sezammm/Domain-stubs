<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Sezam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0fa3a3;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: -20px;
      background: url("images/person.webp") no-repeat center center;
      background-size: cover;
      will-change: transform;
      z-index: 0;
    }

    .ghost-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .ghost {
      position: absolute;
      left: 0;
      top: 0;
      width: 440px;
      height: 860px;
      opacity: 0;
      will-change: transform, opacity, filter;
      filter: blur(42px);
      mix-blend-mode: multiply;
    }

    .ghost-inner {
      position: absolute;
      inset: 0;
      will-change: transform;
    }

    .ghost-shape {
      position: absolute;
      inset: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      background: rgba(7, 10, 14, 0.78);
      filter: blur(48px);
      transform: translateZ(0);
    }

    .blob-1 {
      left: 146px;
      top: 44px;
      width: 118px;
      height: 138px;
      background: rgba(7, 10, 14, 0.68);
      filter: blur(34px);
    }

    .blob-2 {
      left: 104px;
      top: 16px;
      width: 196px;
      height: 222px;
      background: rgba(4, 7, 11, 0.48);
      filter: blur(60px);
    }

    .blob-3 {
      left: 50px;
      top: 154px;
      width: 320px;
      height: 154px;
      background: rgba(7, 10, 14, 0.62);
      filter: blur(50px);
    }

    .blob-4 {
      left: 100px;
      top: 232px;
      width: 232px;
      height: 310px;
      background: rgba(6, 9, 13, 0.72);
      filter: blur(46px);
    }

    .blob-5 {
      left: 74px;
      top: 430px;
      width: 286px;
      height: 306px;
      background: rgba(5, 8, 12, 0.62);
      filter: blur(62px);
    }

    .blob-6 {
      left: 10px;
      top: 230px;
      width: 154px;
      height: 320px;
      background: rgba(5, 8, 12, 0.40);
      filter: blur(68px);
    }

    .blob-7 {
      right: 10px;
      top: 240px;
      width: 154px;
      height: 306px;
      background: rgba(5, 8, 12, 0.40);
      filter: blur(68px);
    }

    .blob-8 {
      left: 154px;
      top: 226px;
      width: 110px;
      height: 314px;
      background: rgba(0, 0, 0, 0.30);
      filter: blur(46px);
    }

    .blob-9 {
      left: 130px;
      top: 600px;
      width: 176px;
      height: 136px;
      background: rgba(4, 6, 10, 0.24);
      filter: blur(62px);
    }

    .woman-layer {
      position: fixed;
      inset: -20px;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      background: url("images/woman-cutout.webp") no-repeat center center;
      background-size: cover;
      will-change: transform;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.10);
      z-index: 3;
      pointer-events: none;
    }

    .email {
      position: fixed;
      right: 60px;
      bottom: 60px;
      z-index: 4;
      will-change: transform;
      animation: floatSmooth 8s ease-in-out infinite;
    }

    .email img {
      width: 420px;
      display: block;
      height: auto;
      transition: transform 0.4s ease;
    }

    .email a {
      display: block;
      text-decoration: none;
    }

    .email:hover img {
      transform: scale(1.03);
    }

    @keyframes floatSmooth {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 1024px) {
      .ghost {
        width: 320px;
        height: 620px;
        filter: blur(34px);
      }

      .blob-1 { left: 106px; top: 30px; width: 84px; height: 98px; }
      .blob-2 { left: 76px; top: 10px; width: 140px; height: 156px; }
      .blob-3 { left: 34px; top: 110px; width: 226px; height: 108px; }
      .blob-4 { left: 72px; top: 166px; width: 164px; height: 214px; }
      .blob-5 { left: 50px; top: 314px; width: 210px; height: 224px; }
      .blob-6 { left: 4px; top: 166px; width: 110px; height: 218px; }
      .blob-7 { right: 4px; top: 170px; width: 110px; height: 214px; }
      .blob-8 { left: 110px; top: 164px; width: 78px; height: 218px; }
      .blob-9 { left: 92px; top: 440px; width: 120px; height: 90px; }

      .email {
        right: 40px;
        bottom: 40px;
      }

      .email img {
        width: 300px;
      }
    }

    @media (max-width: 768px) {
      .ghost {
        width: 200px;
        height: 390px;
        filter: blur(24px);
      }

      .blob-1 { left: 66px; top: 18px; width: 54px; height: 62px; }
      .blob-2 { left: 48px; top: 6px; width: 86px; height: 96px; }
      .blob-3 { left: 18px; top: 68px; width: 140px; height: 66px; }
      .blob-4 { left: 42px; top: 102px; width: 104px; height: 138px; }
      .blob-5 { left: 28px; top: 188px; width: 134px; height: 142px; }
      .blob-6 { left: 0px; top: 100px; width: 68px; height: 142px; }
      .blob-7 { right: 0px; top: 104px; width: 68px; height: 138px; }
      .blob-8 { left: 68px; top: 100px; width: 50px; height: 140px; }
      .blob-9 { left: 58px; top: 274px; width: 82px; height: 58px; }

      .email {
        right: 20px;
        bottom: 20px;
      }

      .email img {
        width: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bg" id="bg"></div>

    <div class="ghost-layer">
      <div class="ghost" id="ghost">
        <div class="ghost-inner" id="ghostInner">
          <div class="ghost-shape">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
            <div class="blob blob-5"></div>
            <div class="blob blob-6"></div>
            <div class="blob blob-7"></div>
            <div class="blob blob-8"></div>
            <div class="blob blob-9"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="woman-layer" id="womanCutout"></div>

    <div class="overlay"></div>

    <div class="email" id="email">
      <a href="mailto:sezam3@ya.ru">
        <img src="images/contact.webp" alt="sezam3@ya.ru">
      </a>
    </div>
  </div>

  <script>
    const bg = document.getElementById("bg");
    const email = document.getElementById("email");
    const ghost = document.getElementById("ghost");
    const ghostInner = document.getElementById("ghostInner");
    const womanCutout = document.getElementById("womanCutout");

    let mouseX = 0;
    let mouseY = 0;
    let currentX = 0;
    let currentY = 0;

    document.addEventListener("mousemove", (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });

    function animateParallax() {
      currentX += (mouseX - currentX) * 0.05;
      currentY += (mouseY - currentY) * 0.05;

      bg.style.transform = `translate(${currentX * 8}px, ${currentY * 8}px) scale(1.02)`;
      womanCutout.style.transform = `translate(${currentX * 4}px, ${currentY * 4}px) scale(1.02)`;
      email.style.transform = `translate(${currentX * 14}px, ${currentY * 14}px)`;

      requestAnimationFrame(animateParallax);
    }

    animateParallax();

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getGhostSize() {
      if (window.innerWidth <= 768) return { w: 200, h: 390 };
      if (window.innerWidth <= 1024) return { w: 320, h: 620 };
      return { w: 440, h: 860 };
    }

    function getPlacement() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const size = getGhostSize();

      const isLeft = Math.random() < 0.5;
      let xPercent;
      let yPercent;

      if (window.innerWidth <= 768) {
        xPercent = isLeft ? rand(18, 30) : rand(70, 82);
        yPercent = rand(18, 58);
      } else if (window.innerWidth <= 1024) {
        xPercent = isLeft ? rand(18, 32) : rand(68, 82);
        yPercent = rand(14, 60);
      } else {
        xPercent = isLeft ? rand(18, 34) : rand(66, 82);
        yPercent = rand(12, 62);
      }

      return {
        x: (vw * xPercent / 100) - size.w / 2,
        y: (vh * yPercent / 100) - size.h / 2,
        side: isLeft ? "left" : "right"
      };
    }

    function setGhostMood() {
      const blur = rand(34, 48);
      const peak = rand(0.28, 0.48);
      const scale = rand(1.08, 1.24);

      ghost.dataset.peak = peak.toFixed(3);
      ghost.dataset.scale = scale.toFixed(3);
      ghost.style.filter = `blur(${blur.toFixed(1)}px)`;

      const blobs = ghost.querySelectorAll(".blob");
      blobs.forEach(blob => {
        blob.style.opacity = (0.90 + Math.random() * 0.26).toFixed(2);
        blob.style.transform = `translate(${rand(-14, 14).toFixed(1)}px, ${rand(-10, 10).toFixed(1)}px)`;
      });
    }

    function animateGhostSlow() {
      return new Promise(resolve => {
        const { x, y, side } = getPlacement();
        setGhostMood();

        ghost.style.left = `${x}px`;
        ghost.style.top = `${y}px`;

        const appearDuration = rand(1800, 3400);
        const holdDuration = rand(700, 1800);
        const fadeDuration = rand(2200, 4200);

        const driftMainX = side === "left" ? rand(18, 58) : rand(-58, -18);
        const driftMainY = rand(-12, 14);
        const sideSwayA = rand(6, 16);
        const sideSwayB = rand(4, 14);
        const verticalBreath = rand(3, 9);

        const peakOpacity = parseFloat(ghost.dataset.peak || "0.36");
        const baseScale = parseFloat(ghost.dataset.scale || "1.12");

        const startTime = performance.now();
        const total = appearDuration + holdDuration + fadeDuration;

        function frame(now) {
          const elapsed = now - startTime;
          const t = Math.min(elapsed / total, 1);

          let opacity = 0;
          let progress = 0;

          if (elapsed <= appearDuration) {
            const p = elapsed / appearDuration;
            opacity = peakOpacity * easeOutCubic(p);
            progress = 0.25 * p;
          } else if (elapsed <= appearDuration + holdDuration) {
            const p = (elapsed - appearDuration) / holdDuration;
            opacity = peakOpacity * (0.96 + Math.sin(p * Math.PI * 2) * 0.04);
            progress = 0.25 + 0.15 * p;
          } else {
            const p = (elapsed - appearDuration - holdDuration) / fadeDuration;
            opacity = peakOpacity * (1 - easeInOutQuad(p));
            progress = 0.40 + 0.60 * p;
          }

          const life = t * Math.PI * 2.2;
          const moveX =
            driftMainX * progress +
            Math.sin(life * 0.8) * sideSwayA +
            Math.sin(life * 1.7) * sideSwayB * 0.45;

          const moveY =
            driftMainY * progress +
            Math.sin(life * 1.2) * verticalBreath;

          const scale = baseScale + Math.sin(life * 0.7) * 0.014;

          ghost.style.opacity = opacity.toFixed(3);
          ghostInner.style.transform =
            `translate(${moveX.toFixed(2)}px, ${moveY.toFixed(2)}px) scale(${scale.toFixed(3)})`;

          if (elapsed < total) {
            requestAnimationFrame(frame);
          } else {
            ghost.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function animateGhostDash() {
      return new Promise(resolve => {
        const size = getGhostSize();
        setGhostMood();

        const fromLeft = Math.random() < 0.5;
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        let startX, endX, baseY;

        if (fromLeft) {
          startX = -size.w * 0.9;
          endX = vw + size.w * 0.2;
        } else {
          startX = vw + size.w * 0.2;
          endX = -size.w * 0.9;
        }

        if (window.innerWidth <= 768) {
          baseY = vh * rand(0.20, 0.52);
        } else if (window.innerWidth <= 1024) {
          baseY = vh * rand(0.16, 0.56);
        } else {
          baseY = vh * rand(0.14, 0.60);
        }

        const diag = rand(-80, 80);
        const duration = rand(700, 1200);
        const peakOpacity = rand(0.18, 0.32);
        const baseScale = rand(1.02, 1.18);

        ghost.style.left = `${startX}px`;
        ghost.style.top = `${baseY - size.h / 2}px`;

        const startTime = performance.now();

        function frame(now) {
          const elapsed = now - startTime;
          const p = Math.min(elapsed / duration, 1);

          const x = startX + (endX - startX) * easeInOutQuad(p);
          const y = (baseY - size.h / 2) + diag * p;
          const opacity = Math.sin(p * Math.PI) * peakOpacity;
          const wobbleX = Math.sin(p * Math.PI * 4) * 8;
          const wobbleY = Math.sin(p * Math.PI * 3) * 4;

          ghost.style.left = `${x}px`;
          ghost.style.top = `${y}px`;
          ghost.style.opacity = opacity.toFixed(3);
          ghostInner.style.transform =
            `translate(${wobbleX.toFixed(2)}px, ${wobbleY.toFixed(2)}px) scale(${(baseScale + Math.sin(p * Math.PI) * 0.03).toFixed(3)})`;

          if (elapsed < duration) {
            requestAnimationFrame(frame);
          } else {
            ghost.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOutQuad(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    async function ghostLoop() {
      while (true) {
        await sleep(randInt(1200, 5200));

        const dashChance = 0.22;
        if (Math.random() < dashChance) {
          await animateGhostDash();
        } else {
          await animateGhostSlow();
        }

        await sleep(randInt(500, 2200));
      }
    }

    ghostLoop();
  </script>
</body>
</html>
