<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/webp" href="favicon.webp">

  <title>Fog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0fa3a3;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: -20px;
      background: url("images/person.webp") no-repeat center center;
      background-size: cover;
      will-change: transform;
      z-index: 0;
    }

    .ghost-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .ghost {
      position: absolute;
      left: 0;
      top: 0;
      width: 440px;
      height: 860px;
      opacity: 0;
      will-change: transform, opacity, filter;
      filter: blur(42px);
      mix-blend-mode: multiply;
    }

    .ghost-inner {
      position: absolute;
      inset: 0;
      will-change: transform;
    }

    .ghost-shape {
      position: absolute;
      inset: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      background: rgba(7, 10, 14, 0.78);
      filter: blur(48px);
      transform: translateZ(0);
    }

    .blob-1 {
      left: 146px;
      top: 44px;
      width: 118px;
      height: 138px;
      background: rgba(7, 10, 14, 0.68);
      filter: blur(34px);
    }

    .blob-2 {
      left: 104px;
      top: 16px;
      width: 196px;
      height: 222px;
      background: rgba(4, 7, 11, 0.48);
      filter: blur(60px);
    }

    .blob-3 {
      left: 50px;
      top: 154px;
      width: 320px;
      height: 154px;
      background: rgba(7, 10, 14, 0.62);
      filter: blur(50px);
    }

    .blob-4 {
      left: 100px;
      top: 232px;
      width: 232px;
      height: 310px;
      background: rgba(6, 9, 13, 0.72);
      filter: blur(46px);
    }

    .blob-5 {
      left: 74px;
      top: 430px;
      width: 286px;
      height: 306px;
      background: rgba(5, 8, 12, 0.62);
      filter: blur(62px);
    }

    .blob-6 {
      left: 10px;
      top: 230px;
      width: 154px;
      height: 320px;
      background: rgba(5, 8, 12, 0.40);
      filter: blur(68px);
    }

    .blob-7 {
      right: 10px;
      top: 240px;
      width: 154px;
      height: 306px;
      background: rgba(5, 8, 12, 0.40);
      filter: blur(68px);
    }

    .blob-8 {
      left: 154px;
      top: 226px;
      width: 110px;
      height: 314px;
      background: rgba(0, 0, 0, 0.30);
      filter: blur(46px);
    }

    .blob-9 {
      left: 130px;
      top: 600px;
      width: 176px;
      height: 136px;
      background: rgba(4, 6, 10, 0.24);
      filter: blur(62px);
    }

    /* Призрачная ладонь */
    .hand-slam {
      position: absolute;
      left: 0;
      top: 0;
      width: 300px;
      height: 360px;
      opacity: 0;
      pointer-events: none;
      filter: blur(18px);
      mix-blend-mode: multiply;
      will-change: transform, opacity, filter;
    }

    .hand-inner {
      position: absolute;
      inset: 0;
      will-change: transform;
    }

    .palm {
      position: absolute;
      left: 96px;
      top: 98px;
      width: 110px;
      height: 122px;
      border-radius: 46% 46% 42% 42% / 44% 44% 36% 36%;
      background: rgba(6, 9, 13, 0.80);
      filter: blur(20px);
    }

    .finger {
      position: absolute;
      width: 28px;
      border-radius: 50px;
      background: rgba(5, 8, 12, 0.84);
      filter: blur(12px);
      transform-origin: center bottom;
    }

    .finger.f1 { left: 92px; top: 20px; height: 116px; transform: rotate(-10deg); }
    .finger.f2 { left: 124px; top: 6px; height: 134px; transform: rotate(-4deg); }
    .finger.f3 { left: 156px; top: 2px; height: 138px; transform: rotate(2deg); }
    .finger.f4 { left: 188px; top: 18px; height: 120px; transform: rotate(9deg); }

    .thumb {
      position: absolute;
      left: 46px;
      top: 126px;
      width: 74px;
      height: 42px;
      border-radius: 42px;
      background: rgba(5, 8, 12, 0.78);
      filter: blur(14px);
      transform: rotate(-32deg);
    }

    .hand-aura-1,
    .hand-aura-2 {
      position: absolute;
      border-radius: 50%;
      background: rgba(5, 8, 12, 0.34);
      filter: blur(42px);
    }

    .hand-aura-1 {
      left: 54px;
      top: 56px;
      width: 190px;
      height: 210px;
    }

    .hand-aura-2 {
      left: 22px;
      top: 96px;
      width: 240px;
      height: 220px;
    }

    .woman-layer {
      position: fixed;
      inset: -20px;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      background: url("images/woman-cutout.webp") no-repeat center center;
      background-size: cover;
      will-change: transform;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.10);
      z-index: 3;
      pointer-events: none;
    }

    .email {
      position: fixed;
      right: 60px;
      bottom: 60px;
      z-index: 4;
      will-change: transform;
      animation: floatSmooth 8s ease-in-out infinite;
    }

    .email img {
      width: 500px;
      display: block;
      height: auto;
      transition: transform 0.4s ease;
    }

    .email a {
      display: block;
      text-decoration: none;
    }

    .email:hover img {
      transform: scale(1.03);
    }

    @keyframes floatSmooth {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 1024px) {
      .ghost {
        width: 320px;
        height: 620px;
        filter: blur(34px);
      }

      .blob-1 { left: 106px; top: 30px; width: 84px; height: 98px; }
      .blob-2 { left: 76px; top: 10px; width: 140px; height: 156px; }
      .blob-3 { left: 34px; top: 110px; width: 226px; height: 108px; }
      .blob-4 { left: 72px; top: 166px; width: 164px; height: 214px; }
      .blob-5 { left: 50px; top: 314px; width: 210px; height: 224px; }
      .blob-6 { left: 4px; top: 166px; width: 110px; height: 218px; }
      .blob-7 { right: 4px; top: 170px; width: 110px; height: 214px; }
      .blob-8 { left: 110px; top: 164px; width: 78px; height: 218px; }
      .blob-9 { left: 92px; top: 440px; width: 120px; height: 90px; }

      .hand-slam {
        width: 230px;
        height: 280px;
      }

      .palm { left: 72px; top: 78px; width: 82px; height: 92px; }
      .finger { width: 20px; }
      .finger.f1 { left: 68px; top: 18px; height: 84px; }
      .finger.f2 { left: 92px; top: 6px; height: 98px; }
      .finger.f3 { left: 116px; top: 4px; height: 100px; }
      .finger.f4 { left: 140px; top: 16px; height: 88px; }
      .thumb { left: 34px; top: 104px; width: 56px; height: 30px; }
      .hand-aura-1 { left: 42px; top: 42px; width: 140px; height: 150px; }
      .hand-aura-2 { left: 12px; top: 72px; width: 180px; height: 160px; }

      .email {
        right: 40px;
        bottom: 40px;
      }

      .email img {
        width: 350px;
      }
    }

    @media (max-width: 768px) {
      .ghost {
        width: 200px;
        height: 390px;
        filter: blur(24px);
      }

      .blob-1 { left: 66px; top: 18px; width: 54px; height: 62px; }
      .blob-2 { left: 48px; top: 6px; width: 86px; height: 96px; }
      .blob-3 { left: 18px; top: 68px; width: 140px; height: 66px; }
      .blob-4 { left: 42px; top: 102px; width: 104px; height: 138px; }
      .blob-5 { left: 28px; top: 188px; width: 134px; height: 142px; }
      .blob-6 { left: 0px; top: 100px; width: 68px; height: 142px; }
      .blob-7 { right: 0px; top: 104px; width: 68px; height: 138px; }
      .blob-8 { left: 68px; top: 100px; width: 50px; height: 140px; }
      .blob-9 { left: 58px; top: 274px; width: 82px; height: 58px; }

      .hand-slam {
        width: 160px;
        height: 190px;
      }

      .palm { left: 50px; top: 56px; width: 58px; height: 64px; }
      .finger { width: 14px; filter: blur(10px); }
      .finger.f1 { left: 48px; top: 12px; height: 58px; }
      .finger.f2 { left: 66px; top: 4px; height: 68px; }
      .finger.f3 { left: 84px; top: 4px; height: 70px; }
      .finger.f4 { left: 102px; top: 12px; height: 60px; }
      .thumb { left: 24px; top: 76px; width: 38px; height: 20px; }
      .hand-aura-1 { left: 28px; top: 28px; width: 96px; height: 104px; }
      .hand-aura-2 { left: 8px; top: 54px; width: 124px; height: 112px; }

      .email {
        right: 20px;
        bottom: 20px;
      }

      .email img {
        width: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bg" id="bg"></div>

    <div class="ghost-layer">
      <div class="ghost" id="ghost">
        <div class="ghost-inner" id="ghostInner">
          <div class="ghost-shape">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
            <div class="blob blob-5"></div>
            <div class="blob blob-6"></div>
            <div class="blob blob-7"></div>
            <div class="blob blob-8"></div>
            <div class="blob blob-9"></div>
          </div>
        </div>
      </div>

      <div class="hand-slam" id="handSlam">
        <div class="hand-inner" id="handInner">
          <div class="hand-aura-1"></div>
          <div class="hand-aura-2"></div>
          <div class="palm"></div>
          <div class="finger f1"></div>
          <div class="finger f2"></div>
          <div class="finger f3"></div>
          <div class="finger f4"></div>
          <div class="thumb"></div>
        </div>
      </div>
    </div>

    <div class="woman-layer" id="womanCutout"></div>

    <div class="overlay"></div>

    <div class="email" id="email">
      <a href="mailto:sezam3@ya.ru">
        <img src="images/contact.webp" alt="sezam3@ya.ru">
      </a>
    </div>
  </div>

  <script>
    const bg = document.getElementById("bg");
    const email = document.getElementById("email");
    const ghost = document.getElementById("ghost");
    const ghostInner = document.getElementById("ghostInner");
    const womanCutout = document.getElementById("womanCutout");
    const handSlam = document.getElementById("handSlam");
    const handInner = document.getElementById("handInner");

    let mouseX = 0;
    let mouseY = 0;
    let currentX = 0;
    let currentY = 0;

    document.addEventListener("mousemove", (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });

    function animateParallax() {
      currentX += (mouseX - currentX) * 0.05;
      currentY += (mouseY - currentY) * 0.05;

      bg.style.transform = `translate(${currentX * 8}px, ${currentY * 8}px) scale(1.02)`;
      womanCutout.style.transform = `translate(${currentX * 4}px, ${currentY * 4}px) scale(1.02)`;
      email.style.transform = `translate(${currentX * 14}px, ${currentY * 14}px)`;

      requestAnimationFrame(animateParallax);
    }

    animateParallax();

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOutQuad(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function getGhostSize() {
      if (window.innerWidth <= 768) return { w: 200, h: 390 };
      if (window.innerWidth <= 1024) return { w: 320, h: 620 };
      return { w: 440, h: 860 };
    }

    function getPlacement() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const size = getGhostSize();
      const isLeft = Math.random() < 0.5;
      let xPercent;
      let yPercent;

      if (window.innerWidth <= 768) {
        xPercent = isLeft ? rand(18, 30) : rand(70, 82);
        yPercent = rand(30, 72);
      } else if (window.innerWidth <= 1024) {
        xPercent = isLeft ? rand(18, 32) : rand(68, 82);
        yPercent = rand(26, 74);
      } else {
        xPercent = isLeft ? rand(18, 34) : rand(66, 82);
        yPercent = rand(24, 76);
      }

      return {
        x: (vw * xPercent / 100) - size.w / 2,
        y: (vh * yPercent / 100) - size.h / 2,
        side: isLeft ? "left" : "right"
      };
    }

    function setGhostMood() {
      const blur = rand(34, 48);
      const peak = rand(0.30, 0.52);
      const scale = rand(1.08, 1.24);

      ghost.dataset.peak = peak.toFixed(3);
      ghost.dataset.scale = scale.toFixed(3);
      ghost.style.filter = `blur(${blur.toFixed(1)}px)`;

      const blobs = ghost.querySelectorAll(".blob");
      blobs.forEach(blob => {
        blob.style.opacity = (0.92 + Math.random() * 0.26).toFixed(2);
        blob.style.transform = `translate(${rand(-14, 14).toFixed(1)}px, ${rand(-10, 10).toFixed(1)}px)`;
      });
    }

    function animateGhostSlow() {
      return new Promise(resolve => {
        const { x, y, side } = getPlacement();
        setGhostMood();

        ghost.style.left = `${x}px`;
        ghost.style.top = `${y}px`;

        const appearDuration = rand(1800, 3400);
        const holdDuration = rand(700, 1800);
        const fadeDuration = rand(2200, 4200);

        const driftMainX = side === "left" ? rand(18, 58) : rand(-58, -18);
        const driftMainY = rand(-10, 18);
        const sideSwayA = rand(6, 16);
        const sideSwayB = rand(4, 14);
        const verticalBreath = rand(3, 11);

        const peakOpacity = parseFloat(ghost.dataset.peak || "0.38");
        const baseScale = parseFloat(ghost.dataset.scale || "1.12");

        const startTime = performance.now();
        const total = appearDuration + holdDuration + fadeDuration;

        function frame(now) {
          const elapsed = now - startTime;
          const t = Math.min(elapsed / total, 1);

          let opacity = 0;
          let progress = 0;

          if (elapsed <= appearDuration) {
            const p = elapsed / appearDuration;
            opacity = peakOpacity * easeOutCubic(p);
            progress = 0.25 * p;
          } else if (elapsed <= appearDuration + holdDuration) {
            const p = (elapsed - appearDuration) / holdDuration;
            opacity = peakOpacity * (0.96 + Math.sin(p * Math.PI * 2) * 0.04);
            progress = 0.25 + 0.15 * p;
          } else {
            const p = (elapsed - appearDuration - holdDuration) / fadeDuration;
            opacity = peakOpacity * (1 - easeInOutQuad(p));
            progress = 0.40 + 0.60 * p;
          }

          const life = t * Math.PI * 2.2;
          const moveX =
            driftMainX * progress +
            Math.sin(life * 0.8) * sideSwayA +
            Math.sin(life * 1.7) * sideSwayB * 0.45;

          const moveY =
            driftMainY * progress +
            Math.sin(life * 1.2) * verticalBreath;

          const scale = baseScale + Math.sin(life * 0.7) * 0.014;

          ghost.style.opacity = opacity.toFixed(3);
          ghostInner.style.transform =
            `translate(${moveX.toFixed(2)}px, ${moveY.toFixed(2)}px) scale(${scale.toFixed(3)})`;

          if (elapsed < total) {
            requestAnimationFrame(frame);
          } else {
            ghost.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function animateGhostDash() {
      return new Promise(resolve => {
        const size = getGhostSize();
        setGhostMood();

        const fromLeft = Math.random() < 0.5;
        const lowPass = Math.random() < 0.55;
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        let startX, endX, baseY;

        if (fromLeft) {
          startX = -size.w * 0.9;
          endX = vw + size.w * 0.2;
        } else {
          startX = vw + size.w * 0.2;
          endX = -size.w * 0.9;
        }

        if (window.innerWidth <= 768) {
          baseY = lowPass ? vh * rand(0.52, 0.78) : vh * rand(0.26, 0.48);
        } else if (window.innerWidth <= 1024) {
          baseY = lowPass ? vh * rand(0.50, 0.80) : vh * rand(0.24, 0.46);
        } else {
          baseY = lowPass ? vh * rand(0.48, 0.80) : vh * rand(0.22, 0.44);
        }

        const diag = rand(-110, 110);
        const duration = rand(700, 1200);
        const peakOpacity = rand(0.20, 0.34);
        const baseScale = rand(1.02, 1.20);

        ghost.style.left = `${startX}px`;
        ghost.style.top = `${baseY - size.h / 2}px`;

        const startTime = performance.now();

        function frame(now) {
          const elapsed = now - startTime;
          const p = Math.min(elapsed / duration, 1);

          const x = startX + (endX - startX) * easeInOutQuad(p);
          const y = (baseY - size.h / 2) + diag * p;
          const opacity = Math.sin(p * Math.PI) * peakOpacity;
          const wobbleX = Math.sin(p * Math.PI * 4) * 8;
          const wobbleY = Math.sin(p * Math.PI * 3) * 5;

          ghost.style.left = `${x}px`;
          ghost.style.top = `${y}px`;
          ghost.style.opacity = opacity.toFixed(3);
          ghostInner.style.transform =
            `translate(${wobbleX.toFixed(2)}px, ${wobbleY.toFixed(2)}px) scale(${(baseScale + Math.sin(p * Math.PI) * 0.03).toFixed(3)})`;

          if (elapsed < duration) {
            requestAnimationFrame(frame);
          } else {
            ghost.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function animateHandSlam() {
      return new Promise(resolve => {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const fromLeft = Math.random() < 0.5;

        let handW, handH;
        if (window.innerWidth <= 768) {
          handW = 160; handH = 190;
        } else if (window.innerWidth <= 1024) {
          handW = 230; handH = 280;
        } else {
          handW = 300; handH = 360;
        }

        const baseX = fromLeft ? vw * rand(0.04, 0.18) : vw * rand(0.74, 0.88);
        const baseY = vh * rand(0.64, 0.84);

        const slamInX = fromLeft ? -rand(70, 130) : rand(70, 130);
        const settleDriftY = rand(30, 90);
        const settleDriftX = fromLeft ? rand(10, 28) : rand(-28, -10);

        handSlam.style.left = `${baseX - handW / 2}px`;
        handSlam.style.top = `${baseY - handH / 2}px`;
        handSlam.style.filter = `blur(${rand(14, 22).toFixed(1)}px)`;

        handInner.style.transform = fromLeft
          ? `translate(${slamInX}px, 40px) scale(0.82)`
          : `translate(${slamInX}px, 40px) scale(0.82) rotateY(180deg)`;

        const hitDuration = rand(120, 220);
        const holdDuration = rand(200, 500);
        const fadeDuration = rand(1200, 2200);
        const peakOpacity = rand(0.24, 0.40);

        const startTime = performance.now();
        const total = hitDuration + holdDuration + fadeDuration;

        function frame(now) {
          const elapsed = now - startTime;

          let opacity = 0;
          let tx = 0;
          let ty = 0;
          let sc = 1;

          if (elapsed <= hitDuration) {
            const p = elapsed / hitDuration;
            const e = easeOutCubic(p);
            opacity = peakOpacity * e;
            tx = slamInX * (1 - e);
            ty = 40 * (1 - e);
            sc = 0.82 + e * 0.28;
          } else if (elapsed <= hitDuration + holdDuration) {
            const p = (elapsed - hitDuration) / holdDuration;
            opacity = peakOpacity * (0.96 + Math.sin(p * Math.PI) * 0.04);
            tx = Math.sin(p * Math.PI * 3) * 2;
            ty = Math.sin(p * Math.PI * 2) * 2;
            sc = 1.10 - Math.sin(p * Math.PI) * 0.02;
          } else {
            const p = (elapsed - hitDuration - holdDuration) / fadeDuration;
            const e = easeInOutQuad(p);
            opacity = peakOpacity * (1 - e);
            tx = settleDriftX * e;
            ty = settleDriftY * e;
            sc = 1.08 - e * 0.10;
          }

          handSlam.style.opacity = opacity.toFixed(3);

          const transformCore = fromLeft
            ? `translate(${tx.toFixed(2)}px, ${ty.toFixed(2)}px) scale(${sc.toFixed(3)})`
            : `translate(${tx.toFixed(2)}px, ${ty.toFixed(2)}px) scale(${sc.toFixed(3)}) rotateY(180deg)`;

          handInner.style.transform = transformCore;

          if (elapsed < total) {
            requestAnimationFrame(frame);
          } else {
            handSlam.style.opacity = "0";
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    async function ghostLoop() {
      while (true) {
        await sleep(randInt(1000, 4200));

        const r = Math.random();

        if (r < 0.18) {
          await animateHandSlam();
        } else if (r < 0.44) {
          await animateGhostDash();
        } else {
          await animateGhostSlow();
        }

        await sleep(randInt(400, 1800));
      }
    }

    ghostLoop();
  </script>
</body>
</html>
