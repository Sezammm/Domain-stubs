<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/webp" href="favicon.webp">

  <title>Boat Clock</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    body {
      position: relative;
    }

    /* Фон */
    .scene {
      position: fixed;
      inset: 0;
      background: url("images/boat.webp") center center / cover no-repeat;
    }

    /* Слой звезд */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      opacity: 0.85;
      animation: twinkle linear infinite;
      box-shadow:
        0 0 4px rgba(255,255,255,0.7),
        0 0 8px rgba(180,220,255,0.5);
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.18;
        transform: scale(0.8);
      }
      50% {
        opacity: 0.95;
        transform: scale(1.25);
      }
    }

    /* Легкие светящиеся частицы */
    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }

    .spark {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(140, 200, 255, 0.95);
      box-shadow:
        0 0 6px rgba(140, 200, 255, 0.9),
        0 0 14px rgba(140, 200, 255, 0.55);
      animation: floatSpark linear infinite;
    }

    @keyframes floatSpark {
      0% {
        transform: translateY(0) translateX(0) scale(0.7);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120px) translateX(30px) scale(1.2);
        opacity: 0;
      }
    }

    /* Контейнер часов */
    .clock-wrap {
      position: fixed;
      left: 50%;
      top: 15%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 26px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.14);
      backdrop-filter: blur(1px);
      box-shadow:
        0 0 30px rgba(227, 239, 227, 0.16),
        0 0 60px rgba(253, 253, 253, 0.08),
        inset 0 0 20px rgba(0, 0, 0, 0.15);
    }

    .clock {
      display: flex;
      align-items: center;
      gap: 10px;
      transform-origin: center;
      user-select: none;
    }

    /* Двоеточие */
    .colon {
      position: relative;
      width: 26px;
      height: 120px;
      margin: 0 2px;
    }

    .colon::before,
    .colon::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: #00ff00;
      box-shadow:
        0 0 10px #00ff00,
        0 0 20px #00ff00,
        0 0 35px rgba(0,255,0,0.95);
      animation: pulseGlow 1s infinite ease-in-out;
    }

    .colon::before {
      top: 28px;
    }

    .colon::after {
      bottom: 28px;
    }

    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.72;
      }
      50% {
        opacity: 1;
      }
    }

    /* Цифра */
    .digit {
      position: relative;
      width: 72px;
      height: 120px;
      filter:
        drop-shadow(0 0 3px rgba(0,255,0,0.8))
        drop-shadow(0 0 8px rgba(0,255,0,0.6))
        drop-shadow(0 0 15px rgba(0,255,0,0.4));
    }

    .seg {
      position: absolute;
      opacity: 0.06;
      transition: opacity 0.15s ease;
      background: rgba(0, 255, 0, 0.18);
    }

    .seg.on {
      opacity: 1;
      background: #00ff00;
      box-shadow:
        0 0 6px #00ff00,
        0 0 14px #00ff00,
        0 0 22px rgba(0,255,0,0.9);
    }

    /* Горизонтальные сегменты */
    .seg.a, .seg.d, .seg.g {
      width: 44px;
      height: 12px;
      left: 14px;
      clip-path: polygon(
        12% 0%,
        88% 0%,
        100% 50%,
        88% 100%,
        12% 100%,
        0% 50%
      );
    }

    .seg.a { top: 0; }
    .seg.g { top: 54px; }
    .seg.d { bottom: 0; }

    /* Вертикальные сегменты */
    .seg.b, .seg.c, .seg.e, .seg.f {
      width: 12px;
      height: 44px;
      clip-path: polygon(
        0% 12%,
        50% 0%,
        100% 12%,
        100% 88%,
        50% 100%,
        0% 88%
      );
    }

    .seg.f { left: 0; top: 8px; }
    .seg.b { right: 0; top: 8px; }
    .seg.e { left: 0; bottom: 8px; }
    .seg.c { right: 0; bottom: 8px; }

    /* Контактный блок */
    .contact-badge {
      position: fixed;
      right: 34px;
      bottom: 90px;
      z-index: 20;
      display: inline-block;
      animation: contactFadeIn 1.8s ease-out both;
      animation-delay: 0.4s;
    }

    .contact-main {
      display: block;
      width: min(500px, 30vw);
      height: auto;
      opacity: 0.96;
      filter:
        drop-shadow(0 0 6px rgba(255,255,255,0.25))
        drop-shadow(0 0 12px rgba(255,255,255,0.12));
      position: relative;
      z-index: 2;
      user-select: none;
      -webkit-user-drag: none;
    }

    .contact-reflection {
      position: absolute;
      left: 0;
      top: 100%;
      width: min(500px, 30vw);
      height: auto;
      transform: translateY(70%) scaleY(-1);
      transform-origin: top;
      opacity: 0.35;
      filter: blur(0.5px);
      pointer-events: none;
      z-index: 1;
      user-select: none;
      -webkit-user-drag: none;
    }

    @keyframes contactFadeIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Адаптивность */
    @media (max-width: 1100px) {
      .clock-wrap {
        top: 12%;
        transform: translateX(-50%) scale(0.82);
      }
    }

    @media (max-width: 780px) {
      .clock-wrap {
        top: 10%;
        transform: translateX(-50%) scale(0.62);
        padding: 14px 18px;
      }

      .contact-badge {
        right: 20px;
        bottom: 18px;
      }

      .contact-main,
      .contact-reflection {
        width: min(340px, 44vw);
      }
    }

    @media (max-width: 520px) {
      .clock-wrap {
        top: 8%;
        transform: translateX(-50%) scale(0.48);
      }

      .contact-badge {
        right: 12px;
        bottom: 12px;
      }

      .contact-main,
      .contact-reflection {
        width: min(170px, 54vw);
      }

      .contact-reflection {
        opacity: 0.25;
      }
    }
  </style>
</head>
<body>

  <div class="scene"></div>
  <div class="stars" id="stars"></div>
  <div class="sparkles" id="sparkles"></div>

  <div class="clock-wrap">
    <div class="clock" id="clock">
      <div class="digit"></div>
      <div class="digit"></div>
      <div class="colon"></div>
      <div class="digit"></div>
      <div class="digit"></div>
      <div class="colon"></div>
      <div class="digit"></div>
      <div class="digit"></div>
    </div>
  </div>

  <div class="contact-badge" aria-label="Контактная информация">
    <img class="contact-main" src="images/contact.webp" alt="Placeholder-stub mail to: sezam3@ya.ru">
    <img class="contact-reflection" src="images/contact.webp" alt="">
  </div>

  <script>
    const segmentMap = {
      0: ['a', 'b', 'c', 'd', 'e', 'f'],
      1: ['b', 'c'],
      2: ['a', 'b', 'g', 'e', 'd'],
      3: ['a', 'b', 'g', 'c', 'd'],
      4: ['f', 'g', 'b', 'c'],
      5: ['a', 'f', 'g', 'c', 'd'],
      6: ['a', 'f', 'g', 'e', 'c', 'd'],
      7: ['a', 'b', 'c'],
      8: ['a', 'b', 'c', 'd', 'e', 'f', 'g'],
      9: ['a', 'b', 'c', 'd', 'f', 'g']
    };

    function createDigitStructure() {
      document.querySelectorAll('.digit').forEach(digit => {
        ['a', 'b', 'c', 'd', 'e', 'f', 'g'].forEach(name => {
          const seg = document.createElement('div');
          seg.className = `seg ${name}`;
          seg.dataset.seg = name;
          digit.appendChild(seg);
        });
      });
    }

    function setDigit(el, number) {
      const active = segmentMap[number] || [];
      el.querySelectorAll('.seg').forEach(seg => {
        seg.classList.toggle('on', active.includes(seg.dataset.seg));
      });
    }

    function updateClock() {
      const now = new Date();

      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');

      const str = hh + mm + ss;
      const digits = document.querySelectorAll('.digit');

      [...str].forEach((ch, i) => {
        setDigit(digits[i], Number(ch));
      });
    }

    function createStars(count = 90) {
      const stars = document.getElementById('stars');

      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';

        const size = Math.random() * 2.6 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;

        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;

        star.style.animationDuration = `${2 + Math.random() * 4}s`;
        star.style.animationDelay = `${Math.random() * 5}s`;

        stars.appendChild(star);
      }
    }

    function createSparkles(count = 24) {
      const sparkles = document.getElementById('sparkles');

      for (let i = 0; i < count; i++) {
        const spark = document.createElement('div');
        spark.className = 'spark';

        spark.style.left = `${10 + Math.random() * 80}%`;
        spark.style.top = `${55 + Math.random() * 35}%`;

        spark.style.animationDuration = `${5 + Math.random() * 7}s`;
        spark.style.animationDelay = `${Math.random() * 8}s`;

        sparkles.appendChild(spark);
      }
    }

    createDigitStructure();
    createStars();
    createSparkles();
    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
